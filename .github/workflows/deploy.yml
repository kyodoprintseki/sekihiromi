name: Deploy with Secrets
on:
  push:
    branches: [ main ]
# ↓ここを追加（権限不足で赤バツになるのを防ぎます）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: URLを金庫の中身と入れ替える
        # あなたのメインファイル名が「index.html」であることを確認してください
        run: sed -i "s|REPLACE_ME_WITH_URL|${{ secrets.SLACK_GAS_URL }}|g" index.html
      - name: サイトとして公開する
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
