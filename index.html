<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関広見まつり 商品企画</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: #e2e6ed;
    --text: #1a2030;
    --muted: #8a94a6;
    --accent: #2563eb;
    --accent-soft: rgba(37,99,235,0.08);
    --green: #059669;
    --green-soft: rgba(5,150,105,0.08);
    --yellow: #d97706;
    --yellow-soft: rgba(217,119,6,0.08);
    --red: #dc2626;
    --red-soft: rgba(220,38,38,0.08);
    --purple: #7c3aed;
    --purple-soft: rgba(124,58,237,0.08);
  }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--bg);
color: var(--text);
font-family: 'Noto Sans JP', sans-serif;
font-size: 14px;
min-height: 100vh;
}

/* Header */
header {
border-bottom: 1px solid var(--border);
padding: 20px 32px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
background: var(--surface);
z-index: 100;
backdrop-filter: blur(10px);
box-shadow: 0 1px 0 var(--border);
}

.logo {
font-family: 'DM Mono', monospace;
font-size: 18px;
font-weight: 500;
letter-spacing: -0.5px;
color: var(--text);
}
.logo span { color: var(--accent); }

.stats-bar {
display: flex;
gap: 24px;
}

.stat {
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 2px;
}
.stat-num {
font-family: 'DM Mono', monospace;
font-size: 20px;
font-weight: 500;
line-height: 1;
}
.stat-label { font-size: 11px; color: var(--muted); }

/* Main */
main {
max-width: 1200px;
margin: 0 auto;
padding: 32px;
}

/* Controls */
.controls {
display: flex;
gap: 12px;
margin-bottom: 28px;
flex-wrap: wrap;
align-items: center;
}

.search {
flex: 1;
min-width: 200px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 16px;
color: var(--text);
font-family: inherit;
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

select.filter {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 14px;
color: var(--text);
font-family: inherit;
font-size: 14px;
outline: none;
cursor: pointer;
transition: border-color 0.2s;
}
select.filter:focus { border-color: var(--accent); }

.btn-new {
background: var(--accent);
color: white;
border: none;
border-radius: 8px;
padding: 10px 20px;
font-family: inherit;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: opacity 0.2s, transform 0.1s;
white-space: nowrap;
}
.btn-new:hover { opacity: 0.85; }
.btn-new:active { transform: scale(0.97); }

/* Table */
.table-wrap {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 12px;
overflow: hidden;
}

table {
width: 100%;
border-collapse: collapse;
}

thead th {
background: var(--surface2);
padding: 14px 20px;
text-align: left;
font-size: 11px;
font-weight: 500;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--muted);
border-bottom: 1px solid var(--border);
white-space: nowrap;
user-select: none;
}
thead th:hover { color: var(--text); }

tbody tr {
border-bottom: 1px solid var(--border);
transition: background 0.15s;
animation: fadeIn 0.3s ease both;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

@keyframes fadeIn {
from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

td {
padding: 14px 20px;
vertical-align: middle;
}

.case-name {
font-weight: 500;
color: var(--text);
}

.case-id {
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(--muted);
margin-top: 2px;
}

/* Status badge */
.badge {
display: inline-flex;
align-items: center;
gap: 6px;
padding: 4px 10px;
border-radius: 20px;
font-size: 12px;
font-weight: 500;
white-space: nowrap;
}
.badge::before {
content: '';
width: 6px;
height: 6px;
border-radius: 50%;
flex-shrink: 0;
}
.badge-未着手 { background: var(--purple-soft); color: var(--purple); }
.badge-未着手::before { background: var(--purple); }
.badge-進行中 { background: var(--accent-soft); color: var(--accent); }
.badge-進行中::before { background: var(--accent); animation: pulse 1.5s ease infinite; }
.badge-レビュー中 { background: var(--yellow-soft); color: var(--yellow); }
.badge-レビュー中::before { background: var(--yellow); }
.badge-完了 { background: var(--green-soft); color: var(--green); }
.badge-完了::before { background: var(--green); }
.badge-保留 { background: var(--red-soft); color: var(--red); }
.badge-保留::before { background: var(--red); }

/* Print badge */
.print-badge {
display: inline-block;
padding: 3px 9px;
border-radius: 4px;
font-size: 11px;
font-weight: 500;
background: var(--surface2);
color: var(--muted);
border: 1px solid var(--border);
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.5; transform: scale(0.7); }
}

/* Progress bar */
.progress-wrap {
display: flex;
align-items: center;
gap: 10px;
}
.progress-bar {
flex: 1;
height: 4px;
background: var(--border);
border-radius: 2px;
min-width: 80px;
overflow: hidden;
}
.progress-fill {
height: 100%;
border-radius: 2px;
transition: width 0.4s ease;
}
.progress-num {
font-family: 'DM Mono', monospace;
font-size: 12px;
color: var(--muted);
min-width: 32px;
text-align: right;
}

/* Tabs */
.tab-bar {
display: flex;
gap: 4px;
margin-bottom: 24px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 10px;
padding: 4px;
width: fit-content;
}
.tab-btn {
background: none;
border: none;
border-radius: 7px;
padding: 8px 20px;
font-family: inherit;
font-size: 13px;
font-weight: 500;
color: var(--muted);
cursor: pointer;
transition: all 0.15s;
}
.tab-btn.active {
background: var(--accent);
color: #fff;
}
.tab-btn:not(.active):hover { color: var(--text); background: var(--surface2); }

/* Gantt / Calendar */
.gantt-wrap {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 12px;
overflow: hidden;
}

.gantt-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 20px;
border-bottom: 1px solid var(--border);
background: var(--surface2);
}
.gantt-header-title {
font-size: 14px;
font-weight: 500;
}
.gantt-nav {
display: flex;
gap: 8px;
align-items: center;
}
.gantt-nav button {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 6px;
width: 30px;
height: 30px;
cursor: pointer;
font-size: 14px;
color: var(--text);
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}
.gantt-nav button:hover { border-color: var(--accent); color: var(--accent); }
.gantt-period {
font-family: 'DM Mono', monospace;
font-size: 13px;
font-weight: 500;
min-width: 160px;
text-align: center;
}

.gantt-body {
overflow-x: auto;
}

.gantt-table {
width: 100%;
border-collapse: collapse;
min-width: 800px;
}

.gantt-table .col-name {
width: 200px;
min-width: 200px;
}

.gantt-month-header th {
background: var(--surface2);
border-bottom: 1px solid var(--border);
border-right: 1px solid var(--border);
padding: 8px 12px;
font-size: 11px;
font-weight: 600;
color: var(--accent);
letter-spacing: 0.05em;
text-align: center;
}
.gantt-month-header th.col-name {
color: var(--muted);
text-align: left;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.08em;
}

.gantt-week-header th {
background: var(--surface2);
border-bottom: 1px solid var(--border);
border-right: 1px solid var(--border);
padding: 5px 0;
font-size: 10px;
font-family: 'DM Mono', monospace;
color: var(--muted);
text-align: center;
white-space: nowrap;
width: 28px;
min-width: 28px;
max-width: 28px;
}
.gantt-week-header th.col-name {
text-align: left;
padding: 5px 12px;
}
.gantt-week-header th.today-col {
color: var(--accent);
font-weight: 700;
background: var(--accent-soft);
}

.gantt-row {
border-bottom: 1px solid var(--border);
}
.gantt-row:last-child { border-bottom: none; }
.gantt-row:hover .gantt-name-cell { background: var(--surface2); }

.gantt-name-cell {
padding: 10px 12px;
border-right: 2px solid var(--border);
vertical-align: middle;
background: var(--surface);
position: sticky;
left: 0;
z-index: 2;
}
.gantt-row-name {
font-size: 12px;
font-weight: 500;
color: var(--text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 180px;
}
.gantt-row-sub {
font-size: 10px;
color: var(--muted);
margin-top: 2px;
}

.gantt-cell {
border-right: 1px solid var(--border);
padding: 0;
height: 52px;
vertical-align: middle;
position: relative;
overflow: visible;
width: 28px;
min-width: 28px;
max-width: 28px;
}
.gantt-cell.today-col {
background: rgba(37,99,235,0.04);
}
.gantt-cell.month-end {
border-right: 2px solid var(--border);
}

.gantt-bar {
height: 22px;
border-radius: 4px;
position: absolute;
top: 50%;
transform: translateY(-50%);
min-width: 4px;
cursor: pointer;
transition: opacity 0.15s, filter 0.15s;
display: flex;
align-items: center;
padding: 0 6px;
overflow: visible;
}
.gantt-bar:hover { filter: brightness(0.88); }
.gantt-bar:hover .phase-marker-label { opacity: 1; }
.gantt-bar-label {
font-size: 10px;
font-weight: 600;
color: #fff;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
position: relative;
z-index: 1;
pointer-events: none;
}

/* deadline marker */
.gantt-deadline {
position: absolute;
top: 4px;
bottom: 4px;
width: 3px;
border-radius: 2px;
background: var(--red);
opacity: 0.7;
}

/* today line */
.today-line {
position: absolute;
top: 0;
bottom: 0;
width: 2px;
background: var(--accent);
opacity: 0.5;
pointer-events: none;
z-index: 3;
}

.gantt-empty {
text-align: center;
padding: 40px;
color: var(--muted);
font-size: 14px;
}

/* ガント フェーズマーカー */
.phase-marker {
position: absolute;
top: 50%;
transform: translate(-50%, -50%);
display: flex;
flex-direction: column;
align-items: center;
pointer-events: auto;
cursor: default;
z-index: 10;
}
.phase-marker-diamond {
width: 10px;
height: 10px;
background: #fff;
border: 2px solid rgba(0,0,0,0.35);
border-radius: 2px;
transform: rotate(45deg);
flex-shrink: 0;
}
.phase-marker-label {
position: absolute;
top: -20px;
left: 50%;
transform: translateX(-50%);
font-size: 9px;
font-weight: 700;
color: #fff;
background: rgba(0,0,0,0.5);
padding: 1px 4px;
border-radius: 3px;
white-space: nowrap;
letter-spacing: 0.03em;
pointer-events: none;
}

.deadline {
font-family: 'DM Mono', monospace;
font-size: 12px;
}
.deadline.overdue { color: var(--red); }
.deadline.soon { color: var(--yellow); }
.deadline.ok { color: var(--muted); }

.actions {
display: flex;
gap: 8px;
opacity: 0;
transition: opacity 0.15s;
}
tbody tr:hover .actions { opacity: 1; }

.btn-icon {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 6px;
width: 28px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
color: var(--muted);
transition: all 0.15s;
font-size: 13px;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
.btn-icon.delete:hover { border-color: var(--red); color: var(--red); }

.empty {
text-align: center;
padding: 60px 20px;
color: var(--muted);
font-size: 15px;
}

/* 詳細モーダル */
.detail-overlay {
position: fixed;
inset: 0;
background: rgba(26,32,48,0.5);
backdrop-filter: blur(4px);
z-index: 300;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s;
}
.detail-overlay.open {
opacity: 1;
pointer-events: all;
}
.detail-modal {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
width: 100%;
max-width: 560px;
max-height: 90vh;
overflow-y: auto;
transform: translateY(12px);
transition: transform 0.2s;
box-shadow: 0 20px 60px rgba(0,0,0,0.14);
}
.detail-overlay.open .detail-modal { transform: translateY(0); }
.detail-modal-header {
padding: 20px 24px 16px;
border-bottom: 1px solid var(--border);
display: flex;
align-items: flex-start;
gap: 12px;
}
.detail-modal-title {
flex: 1;
font-size: 18px;
font-weight: 700;
color: var(--text);
line-height: 1.3;
}
.detail-modal-id {
font-family: 'DM Mono', monospace;
font-size: 11px;
color: var(--muted);
margin-top: 4px;
}
.detail-close {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 8px;
width: 32px;
height: 32px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
color: var(--muted);
font-size: 16px;
flex-shrink: 0;
transition: all 0.15s;
}
.detail-close:hover { border-color: var(--red); color: var(--red); }
.detail-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
.detail-row {
display: flex;
flex-direction: column;
gap: 6px;
}
.detail-label {
font-size: 11px;
font-weight: 600;
color: var(--muted);
letter-spacing: 0.07em;
text-transform: uppercase;
}
.detail-value {
font-size: 14px;
color: var(--text);
}
.detail-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 14px;
}
.detail-phase-list {
display: flex;
flex-direction: column;
gap: 6px;
}
.detail-phase-item {
display: flex;
align-items: center;
gap: 10px;
padding: 8px 12px;
background: var(--bg);
border-radius: 8px;
border: 1px solid var(--border);
}
.detail-phase-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}
.detail-phase-name {
font-size: 13px;
color: var(--muted);
min-width: 110px;
}
.detail-phase-date {
font-family: 'DM Mono', monospace;
font-size: 13px;
font-weight: 500;
}
.detail-phase-date.overdue { color: var(--red); }
.detail-phase-date.soon { color: var(--yellow); }
.detail-phase-date.ok { color: var(--text); }
.detail-memo {
background: var(--bg);
border: 1px solid var(--border);
border-radius: 8px;
padding: 12px 14px;
font-size: 13px;
color: var(--text);
line-height: 1.7;
white-space: pre-wrap;
word-break: break-all;
min-height: 60px;
}
.detail-memo.empty { color: var(--muted); font-style: italic; }
.detail-progress-wrap {
display: flex;
align-items: center;
gap: 12px;
}
.detail-progress-bar {
flex: 1;
height: 8px;
background: var(--border);
border-radius: 4px;
overflow: hidden;
}
.detail-progress-fill {
height: 100%;
border-radius: 4px;
transition: width 0.4s ease;
}
.detail-progress-num {
font-family: 'DM Mono', monospace;
font-size: 14px;
font-weight: 500;
min-width: 40px;
text-align: right;
}
.detail-footer {
padding: 16px 24px;
border-top: 1px solid var(--border);
display: flex;
justify-content: flex-end;
gap: 10px;
}
.btn-detail-edit {
background: var(--accent);
color: #fff;
border: none;
border-radius: 8px;
padding: 9px 22px;
font-family: inherit;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: opacity 0.2s;
}
.btn-detail-edit:hover { opacity: 0.85; }
.btn-detail-delete {
background: transparent;
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 18px;
font-family: inherit;
font-size: 14px;
color: var(--red);
cursor: pointer;
transition: all 0.15s;
}
.btn-detail-delete:hover { border-color: var(--red); background: var(--red-soft); }
.btn-detail-close {
background: transparent;
border: 1px solid var(--border);
border-radius: 8px;
padding: 9px 18px;
font-family: inherit;
font-size: 14px;
color: var(--muted);
cursor: pointer;
transition: all 0.15s;
}
.btn-detail-close:hover { border-color: var(--text); color: var(--text); }
.case-name-link {
cursor: pointer;
color: var(--accent);
text-decoration: none;
transition: opacity 0.15s;
font-weight: 500;
}
.case-name-link:hover { opacity: 0.7; text-decoration: underline; }
@media (max-width: 640px) {
  .detail-overlay { align-items: flex-end; }
  .detail-modal { border-radius: 16px 16px 0 0; max-width: 100%; max-height: 90vh; }
  .detail-grid { grid-template-columns: 1fr; }
}

/* Modal */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(26,32,48,0.5);
backdrop-filter: blur(4px);
z-index: 200;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s;
}
.modal-overlay.open {
opacity: 1;
pointer-events: all;
}

.modal {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 28px 28px 24px;
width: 100%;
max-width: 520px;
max-height: 90vh;
overflow-y: auto;
transform: translateY(12px);
transition: transform 0.2s;
box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}
.modal-overlay.open .modal {
transform: translateY(0);
}

.modal h2 {
font-size: 16px;
font-weight: 500;
margin-bottom: 16px;
}

.form-group {
margin-bottom: 12px;
}
.form-group label {
display: block;
font-size: 12px;
font-weight: 500;
color: var(--muted);
letter-spacing: 0.06em;
text-transform: uppercase;
margin-bottom: 8px;
}
.form-group input,
.form-group select,
.form-group textarea {
width: 100%;
background: var(--bg);
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 14px;
color: var(--text);
font-family: inherit;
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.progress-input-wrap {
display: flex;
align-items: center;
gap: 12px;
}
.progress-input-wrap input[type=range] {
flex: 1;
accent-color: var(--accent);
padding: 0;
height: auto;
background: none;
border: none;
}
.progress-input-wrap span {
font-family: 'DM Mono', monospace;
font-size: 14px;
min-width: 36px;
text-align: right;
}

.modal-actions {
display: flex;
gap: 10px;
justify-content: flex-end;
margin-top: 28px;
}
.btn-delete-case {
background: transparent;
border: none;
padding: 10px 4px;
font-family: inherit;
font-size: 13px;
color: var(--red);
cursor: pointer;
transition: opacity 0.15s;
}
.btn-delete-case:hover { opacity: 0.7; }
#btnDeleteCase[style*="none"] { display: none; }
.btn-cancel {
background: transparent;
border: 1px solid var(--border);
border-radius: 8px;
padding: 10px 20px;
color: var(--muted);
font-family: inherit;
font-size: 14px;
cursor: pointer;
transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--text); color: var(--text); }
.btn-save {
background: var(--accent);
border: none;
border-radius: 8px;
padding: 10px 24px;
color: white;
font-family: inherit;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: opacity 0.2s;
}
/* フェーズ別期限 */
.phase-grid {
display: flex;
flex-direction: column;
gap: 5px;
}
.phase-row {
display: flex;
align-items: center;
gap: 12px;
padding: 6px 12px;
background: var(--bg);
border: 1px solid var(--border);

          <option>オンデマンド</option>
          <option>シール</option>
          <option>外注</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>フェーズ別期限</label>
      <div class="phase-grid">
        <div class="phase-row">
          <span class="phase-label">デザイン入稿</span>
          <input type="date" id="fDl1" class="phase-date">
        </div>
        <div class="phase-row">
          <span class="phase-label">デザイン初校</span>
          <input type="date" id="fDl2" class="phase-date">
        </div>
        <div class="phase-row">
          <span class="phase-label">デザイン校了</span>
          <input type="date" id="fDl3" class="phase-date">
        </div>
        <div class="phase-row">
          <span class="phase-label">印刷加工仕上がり</span>
          <input type="date" id="fDl4" class="phase-date">
        </div>
        <div class="phase-row">
          <span class="phase-label">セットアップ</span>
          <input type="date" id="fDl5" class="phase-date">
        </div>
        <div class="phase-row" style="border-color: var(--green); background: var(--green-soft);">
          <span class="phase-label" style="color:var(--green);font-weight:600;">完了日</span>
          <input type="date" id="fDl6" class="phase-date">
        </div>
      </div>
    </div>
    <div class="form-group" style="display:none">
    <div class="form-group">
      <label>メモ</label>
      <textarea id="fNote" placeholder="備考・メモ..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-delete-case" id="btnDeleteCase" onclick="deleteCaseFromModal()">🗑 この案件を削除する</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveCase()">保存</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRaCrobzam970CamRNTnczPLp-oK58ct0zDeHZDYApfP5LOFNjMsHddhgqkcd_zGFwSg/exec';

let cases = [];
let editId = null;

// ローディング表示
function showLoading(on) {
  let el = document.getElementById('loadingMsg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingMsg';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;text-align:center;padding:8px;font-size:13px;z-index:9999;';
    document.body.prepend(el);
  }
  if (on) {
    el.textContent = '読み込み中...';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function loadCasesJsonp() {
  return new Promise((resolve) => {
    const cb = 'gcb_' + Date.now();
    const script = document.createElement('script');
    script.src = GAS_URL + '?action=getCases&callback=' + cb;
    window[cb] = (data) => {
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(Array.isArray(data) ? data : []);
    };
    script.onerror = () => {
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve([]);
    };
    document.head.appendChild(script);
  });
}

async function loadCases() {
  showLoading(true);
  try {
    const res = await fetch(GAS_URL + '?action=getCases', {
      method: 'GET',
      redirect: 'follow',
    });
    const data = await res.json();
    cases = Array.isArray(data) ? data.map(c => ({
      ...c,
      progress: parseInt(c.progress) || 0,
    })) : [];
  } catch(e) {
    console.error('loadCases error', e);
    cases = [];
  }
  showLoading(false);
  render();
  if (document.getElementById('viewGantt').style.display !== 'none') renderGantt();
}

async function save() {
  try {
    const formData = new FormData();
    formData.append('action', 'saveCases');
    formData.append('cases', JSON.stringify(cases));
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });
    // 保存完了まで少し待つ
    await new Promise(r => setTimeout(r, 2000));
  } catch(e) {
    console.error('save error', e);
  }
}

let doneExpanded = false;

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const sortF = document.getElementById('sortFilter').value;

  let active = cases.filter(c => {
    if (c.status === '完了') return false;
    const matchS = !statusF || c.status === statusF;
    const matchQ = !search || c.name.toLowerCase().includes(search) || (c.owner||'').toLowerCase().includes(search) || (c.sales||'').toLowerCase().includes(search) || (c.salesEi||'').toLowerCase().includes(search);
    return matchS && matchQ;
  });

  let done = cases.filter(c => {
    if (c.status !== '完了') return false;
    if (statusF && statusF !== '完了') return false;
    const matchQ = !search || c.name.toLowerCase().includes(search) || (c.owner||'').toLowerCase().includes(search) || (c.sales||'').toLowerCase().includes(search) || (c.salesEi||'').toLowerCase().includes(search);
    return matchQ;
  });

  const getEarliestDl = c => ['dl1','dl2','dl3','dl4','dl5','dl6'].map(k => c[k]).filter(Boolean).sort()[0] || '9999';

  const statusOrder = { '保留':0, '未着手':1, '進行中':2, 'レビュー中':3 };
  active.sort((a, b) => {
    if (sortF === 'name') return a.name.localeCompare(b.name, 'ja');
    if (sortF === 'progress') return b.progress - a.progress;
    if (sortF === 'status') return (statusOrder[a.status]||0) - (statusOrder[b.status]||0);
    return getEarliestDl(a) > getEarliestDl(b) ? 1 : -1;
  });

  done.sort((a, b) => (b.completedAt || '0') > (a.completedAt || '0') ? 1 : -1);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const today = new Date(); today.setHours(0,0,0,0);
  const soon = new Date(today); soon.setDate(soon.getDate() + 7);

  const allEmpty = active.length === 0 && done.length === 0;
  document.getElementById('emptyMsg').style.display = allEmpty ? 'block' : 'none';

  function phaseClass(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr); d.setHours(0,0,0,0);
    if (d < today) return 'overdue';
    if (d <= soon) return 'soon';
    return 'ok';
  }
  function phaseColor(cls) {
    if (cls === 'overdue') return 'var(--red)';
    if (cls === 'soon') return 'var(--yellow)';
    return 'var(--border)';
  }

  const PHASES = [
    { key: 'dl1', label: 'デザイン入稿' },
    { key: 'dl2', label: '初校' },
    { key: 'dl3', label: '校了' },
    { key: 'dl4', label: '印刷仕上がり' },
    { key: 'dl5', label: 'セットアップ' },
    { key: 'dl6', label: '完了日', isCompletion: true },
  ];

  function makeRow(c, i, isDone) {
    const phaseHtml = PHASES.map(p => {
      const val = c[p.key];
      if (!val) return '';
      const cls = p.isCompletion ? 'ok' : (isDone ? 'ok' : phaseClass(val));
      const _pd = new Date(val.replace(/-/g, '/'));
      const _dow = ['日','月','火','水','木','金','土'][_pd.getDay()];
      const txt = _pd.getFullYear() + '/' + (_pd.getMonth()+1) + '/' + _pd.getDate() + ' (' + _dow + ')';
      const dotColor = p.isCompletion ? 'var(--green)' : phaseColor(cls);
      return `<div class="phase-item">
        <span class="phase-dot" style="background:${dotColor}"></span>
        <span class="phase-name" style="${p.isCompletion ? 'color:var(--green);font-weight:600;' : ''}">${p.label}</span>
        <span class="phase-date-val ${p.isCompletion ? '' : cls}" style="${p.isCompletion ? 'color:var(--green);font-weight:600;' : ''}">${txt}</span>
      </div>`;
    }).join('');

    const prog = calcProgress(c);
    const progColor = isDone ? 'var(--green)' : prog >= 80 ? 'var(--green)' : prog >= 40 ? 'var(--accent)' : 'var(--purple)';
    const completedTd = isDone
      ? `<td><span class="completed-date">✓ ${c.completedAt ? c.completedAt.replace(/-/g,'/') : '—'}</span></td>`
      : `<td><span style="color:var(--muted);font-size:12px">—</span></td>`;

    const tr = document.createElement('tr');
    tr.style.animationDelay = (i * 20) + 'ms';
    tr.innerHTML = `
      <td>
        <div class="case-name"><span class="case-name-link" onclick="openDetail('${c.id}')">${esc(c.name)}</span></div>
        <div class="case-id">${esc(c.id)}</div>
      </td>
      <td style="white-space:nowrap">${esc(c.owner || '—')}</td>
      <td style="white-space:nowrap">${esc(c.sales || '—')}</td>
      <td style="white-space:nowrap">${esc(c.salesEi || '—')}</td>
      <td><span class="badge badge-${c.status}">${c.status}</span></td>
      <td>${c.print ? `<span class="print-badge">${esc(c.print)}</span>` : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${progColor}"></div></div>
          <span class="progress-num">${prog}%</span>
        </div>
      </td>
      <td><div class="phase-list">${phaseHtml || '<span style="color:var(--muted);font-size:12px">—</span>'}</div></td>
      <td>
        <div class="actions">
          <button class="btn-icon" onclick="openModal('${c.id}')" title="編集">✎</button>
        </div>
      </td>
    `;
    return tr;
  }

  active.forEach((c, i) => tbody.appendChild(makeRow(c, i, false)));

  if (done.length > 0 && !statusF) {
    const toggleTr = document.createElement('tr');
    toggleTr.innerHTML = `<td colspan="9" style="padding:0;">
      <div class="done-toggle" onclick="toggleDone()" id="doneToggle">
        <span class="done-toggle-label">完了済み案件</span>
        <span class="done-toggle-count">${done.length}件</span>
        <span class="done-toggle-arrow ${doneExpanded ? 'open' : ''}" id="doneArrow">▼</span>
      </div>
    </td>`;
    tbody.appendChild(toggleTr);

    const doneTbody = document.createElement('tbody');
    doneTbody.id = 'doneTbody';
    doneTbody.className = 'done-rows';
    doneTbody.style.display = doneExpanded ? '' : 'none';
    done.forEach((c, i) => doneTbody.appendChild(makeRow(c, i, true)));
    tbody.parentElement.insertBefore(doneTbody, tbody.nextSibling);
  }

  document.getElementById('statTotal').textContent = cases.length;
  document.getElementById('statActive').textContent = cases.filter(c => c.status === '進行中').length;
  document.getElementById('statDone').textContent = cases.filter(c => c.status === '完了').length;
  document.getElementById('statOver').textContent = cases.filter(c => {
    if (!c.deadline || c.status === '完了') return false;
    return new Date(c.deadline) < today;
  }).length;
}

function toggleDone() {
  doneExpanded = !doneExpanded;
  const tb = document.getElementById('doneTbody');
  const arrow = document.getElementById('doneArrow');
  if (tb) tb.style.display = doneExpanded ? '' : 'none';
  if (arrow) arrow.classList.toggle('open', doneExpanded);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openModal(id = null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? '案件を編集' : '新規案件';
  if (id) {
    const c = cases.find(x => x.id === id);
    document.getElementById('fName').value = c.name;
    document.getElementById('fOwner').value = c.owner || '';
    document.getElementById('fSales').value = c.sales || '';
    document.getElementById('fSalesEi').value = c.salesEi || '';
    document.getElementById('fStatus').value = c.status;
    document.getElementById('fPrint').value = c.print || '';
    document.getElementById('fDl1').value = c.dl1 || '';
    document.getElementById('fDl2').value = c.dl2 || '';
    document.getElementById('fDl3').value = c.dl3 || '';
    document.getElementById('fDl4').value = c.dl4 || '';
    document.getElementById('fDl5').value = c.dl5 || '';
    document.getElementById('fDl6').value = c.dl6 || '';
    document.getElementById('fProgress').value = c.progress;
    document.getElementById('fProgressVal').textContent = c.progress + '%';
    document.getElementById('fNote').value = c.note || '';
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fOwner').value = '';
    document.getElementById('fSales').value = '';
    document.getElementById('fSalesEi').value = '';
    document.getElementById('fStatus').value = '未着手';
    document.getElementById('fPrint').value = '';
    document.getElementById('fDl1').value = '';
    document.getElementById('fDl2').value = '';
    document.getElementById('fDl3').value = '';
    document.getElementById('fDl4').value = '';
    document.getElementById('fDl5').value = '';
    document.getElementById('fDl6').value = '';
    document.getElementById('fProgress').value = 0;
    document.getElementById('fProgressVal').textContent = '0%';
    document.getElementById('fNote').value = '';
  }
  const delBtn = document.getElementById('btnDeleteCase');
  if (delBtn) delBtn.style.display = id ? '' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('fName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}


function calcProgress(c) {
  if (c.status === '完了') return 100;
  if (c.status === '保留') return parseInt(c.progress) || 0;
  
  const phases = ['dl1','dl2','dl3','dl4','dl5','dl6'];
  const filled = phases.filter(k => c[k] && c[k] !== '').length;
  
  if (filled === 0) {
    // フェーズ未入力はステータスで判定
    if (c.status === '未着手') return 0;
    if (c.status === '進行中') return 30;
    if (c.status === 'レビュー中') return 70;
    return 0;
  }
  
  // フェーズ入力数で計算（各約16%）
  const base = Math.round((filled / 6) * 100);
  
  // ステータス補正
  if (c.status === '未着手') return Math.min(base, 10);
  if (c.status === 'レビュー中') return Math.max(base, 70);
  return base;
}

function saveCase() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const _isEdit = !!editId;
  const _prevCase = _isEdit ? cases.find(x => x.id === editId) : null;
  const _prevStatus = _prevCase ? _prevCase.status : null;
  const _editId = editId;
  const data = {
    name,
    owner: document.getElementById('fOwner').value,
    sales: document.getElementById('fSales').value,
    salesEi: document.getElementById('fSalesEi').value,
    status: document.getElementById('fStatus').value,
    print: document.getElementById('fPrint').value,
    dl1: document.getElementById('fDl1').value,
    dl2: document.getElementById('fDl2').value,
    dl3: document.getElementById('fDl3').value,
    dl4: document.getElementById('fDl4').value,
    dl5: document.getElementById('fDl5').value,
    dl6: document.getElementById('fDl6').value,
    progress: 0, // 後でcalcProgressで上書き
    note: document.getElementById('fNote').value.trim(),
  };

  data.progress = calcProgress({...data});
  if (data.status === '完了') {
    if (editId) {
      const prev = cases.find(x => x.id === editId);
      data.completedAt = prev && prev.completedAt ? prev.completedAt : new Date().toISOString().split('T')[0];
    } else {
      data.completedAt = new Date().toISOString().split('T')[0];
    }
    data.progress = 100;
  } else {
    data.completedAt = null;
  }
  if (editId) {
    const i = cases.findIndex(x => x.id === editId);
    cases[i] = { ...cases[i], ...data };
  } else {
    const num = String(cases.length + 1).padStart(3, '0');
    data.id = 'C-' + num;
    cases.unshift(data);
  }
  closeModal();
  render();
  if (document.getElementById('viewGantt').style.display !== 'none') renderGantt();
  save(); // バックグラウンドで保存
  // ログ・Slack通知
  if (_isEdit) {
    const _updated = cases.find(x => x.id === _editId);
    if (_prevStatus && _updated && _prevStatus !== _updated.status) {
      addLog('🔄', '<strong>' + esc(_updated.name) + '</strong> のステータスを <strong>' + _prevStatus + '</strong> → <strong>' + _updated.status + '</strong> に変更');
    } else {
      addLog('✏️', '<strong>' + esc(name) + '</strong> を編集しました');
    }
  } else {
    addLog('➕', '新規案件 <strong>' + esc(name) + '</strong> を追加しました');
  }
}

function deleteCase(id) {
  if (!confirm('この案件を削除しますか？')) return;
  const _delCase = cases.find(x => x.id === id);
  const _delName = _delCase ? _delCase.name : id;
  cases = cases.filter(c => c.id !== id);
  render();
  if (document.getElementById('viewGantt').style.display !== 'none') renderGantt();
  save(); // バックグラウンドで保存
  addLog('🗑️', '<strong>' + esc(_delName) + '</strong> を削除しました');
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('sortFilter').addEventListener('change', render);

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDetail(); } });

function switchTab(tab) {
  document.getElementById('tabList').classList.toggle('active', tab === 'list');
  document.getElementById('tabGantt').classList.toggle('active', tab === 'gantt');
  document.getElementById('viewList').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('viewGantt').style.display = tab === 'gantt' ? '' : 'none';
  if (tab === 'gantt') renderGantt();
}

let ganttStartMonth = null;

function ganttToday() {
  const now = new Date();
  ganttStartMonth = { year: now.getFullYear(), month: now.getMonth() };
  renderGantt();
}

function ganttMove(delta) {
  if (!ganttStartMonth) ganttToday();
  let m = ganttStartMonth.month + delta;
  let y = ganttStartMonth.year;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  ganttStartMonth = { year: y, month: m };
  renderGantt();
}

function renderGantt() {
  if (!ganttStartMonth) {
    const now = new Date();
    ganttStartMonth = { year: now.getFullYear(), month: now.getMonth() };
  }

  const { year: sy, month: sm } = ganttStartMonth;
  const months = [0,1,2].map(i => {
    let m = sm + i, y = sy;
    if (m > 11) { m -= 12; y++; }
    return { year: y, month: m };
  });

  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const first = months[0], last = months[2];
  document.getElementById('ganttPeriod').textContent =
    `${first.year}年${mNames[first.month]} 〜 ${last.year}年${mNames[last.month]}`;

  const days = [];
  months.forEach(({ year, month }) => {
    const dim = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      days.push({ year, month, day: d, date: new Date(year, month, d) });
    }
  });

  const totalDays = days.length;
  const today = new Date(); today.setHours(0,0,0,0);

  const statusColors = {
    '未着手': '#7c3aed',
    '進行中': '#2563eb',
    'レビュー中': '#d97706',
    '完了': '#059669',
    '保留': '#dc2626',
  };

  let html = `<table class="gantt-table">`;

  html += `<thead><tr class="gantt-month-header"><th class="col-name">案件名</th>`;
  months.forEach(({ year, month }) => {
    const dim = new Date(year, month + 1, 0).getDate();
    html += `<th colspan="${dim}">${mNames[month]}</th>`;
  });
  html += `</tr>`;

  html += `<tr class="gantt-week-header"><th class="col-name">担当者</th>`;
  const dayNames = ['日','月','火','水','木','金','土'];
  days.forEach(({ year, month, day, date }, idx) => {
    const isToday = date.getTime() === today.getTime();
    const dow = date.getDay();
    const isMonthEnd = idx < days.length - 1 && days[idx+1].month !== month;
    let cls = '';
    if (isToday) cls += ' today-col';
    html += `<th class="${cls}" style="${dow===0?'color:var(--red)':dow===6?'color:var(--accent)':''};${isMonthEnd?'border-right:2px solid var(--border)':''}">${day}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const activeCases = cases.filter(c => c.dl1 || c.dl2 || c.dl3 || c.dl4 || c.dl5 || c.dl6);
  if (!activeCases.length) {
    html += `<tr><td colspan="${totalDays+1}" class="gantt-empty">期限が設定された案件がありません</td></tr>`;
  }

  cases.forEach(c => {
    const color = statusColors[c.status] || '#8a94a6';
    const phaseDates = ['dl1','dl2','dl3','dl4','dl5','dl6'].map(k => c[k]).filter(Boolean).sort();
    const cStart = phaseDates[0] || null;
    const cEnd = phaseDates[phaseDates.length - 1] || null;

    html += `<tr class="gantt-row">`;
    html += `<td class="gantt-name-cell">
      <div class="gantt-row-name" title="${c.name}">${c.name}</div>
      <div class="gantt-row-sub">${c.owner || '—'} · <span class="badge badge-${c.status}" style="padding:1px 6px;font-size:10px;">${c.status}</span></div>
    </td>`;

    days.forEach(({ date, month }, idx) => {
      const isToday = date.getTime() === today.getTime();
      const isMonthEnd = idx < days.length - 1 && days[idx+1].month !== month;
      let cellCls = 'gantt-cell';
      if (isToday) cellCls += ' today-col';
      if (isMonthEnd) cellCls += ' month-end';

      html += `<td class="${cellCls}">`;

      if (cStart && cEnd) {
        const startDate = new Date(cStart); startDate.setHours(0,0,0,0);
        const dlDate = new Date(cEnd); dlDate.setHours(0,0,0,0);

        if (date >= startDate && date <= dlDate) {
          const isFirst = (date.getTime() === startDate.getTime()) ||
            (idx === 0 && startDate < days[0].date);

          if (isFirst) {
            const barStartIdx = Math.max(0, days.findIndex(d => d.date.getTime() === startDate.getTime()));
            const barEndIdx = days.findIndex(d => d.date.getTime() === dlDate.getTime());
            const actualEnd = barEndIdx >= 0 ? barEndIdx : days.length - 1;
            const cellCount = (actualEnd - barStartIdx + 1);
            const widthPct = (cellCount / totalDays) * 100;
            html += `<div class="gantt-bar" style="left:2px;width:calc(${widthPct}% * ${totalDays} / 1 - 4px);background:${color};opacity:0.85;" title="${c.name} - ${c.progress}% 完了">
              <div style="position:absolute;left:0;top:0;bottom:0;width:${c.progress}%;background:rgba(255,255,255,0.25);border-radius:4px;"></div>
              <span class="gantt-bar-label">${c.name}</span>
            </div>`;
          }
          if (date.getTime() === dlDate.getTime()) {
            html += `<div class="gantt-deadline" style="right:0;"></div>`;
          }
        }
      }

      html += `</td>`;
    });

    html += `</tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('ganttContent').innerHTML = html;
  fixGanttBars();
  renderGanttMobile();
}

function renderGanttMobile() {
  const el = document.getElementById('ganttMobileList');
  if (!el) return;

  const today = new Date(); today.setHours(0,0,0,0);

  const statusColors = {
    '未着手': '#7c3aed', '進行中': '#2563eb',
    'レビュー中': '#d97706', '完了': '#059669', '保留': '#dc2626',
  };

  const PHASE_LABELS = [
    { key: 'dl1', short: '入稿' },
    { key: 'dl2', short: '初校' },
    { key: 'dl3', short: '校了' },
    { key: 'dl4', short: '仕上がり' },
    { key: 'dl5', short: 'SET UP' },
    { key: 'dl6', short: '完了日', isCompletion: true },
  ];

  const { year: sy, month: sm } = ganttStartMonth || { year: today.getFullYear(), month: today.getMonth() };
  const mNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  const dayMap = {};

  cases.forEach(c => {
    const color = statusColors[c.status] || '#8a94a6';
    PHASE_LABELS.forEach(p => {
      const val = c[p.key];
      if (!val) return;
      if (!dayMap[val]) dayMap[val] = [];
      dayMap[val].push({
        name: c.name,
        short: p.short,
        color: p.isCompletion ? '#059669' : color,
        caseId: c.id,
        status: c.status,
      });
    });
  });

  let html = '';

  for (let mi = 0; mi < 3; mi++) {
    let m = sm + mi, y = sy;
    if (m > 11) { m -= 12; y++; }

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();

    html += `<div class="cal-month">
      <div class="cal-month-title">${y}年 ${mNames[m]}</div>
      <div class="cal-grid">
        <div class="cal-dow">日</div><div class="cal-dow">月</div>
        <div class="cal-dow">火</div><div class="cal-dow">水</div>
        <div class="cal-dow">木</div><div class="cal-dow">金</div>
        <div class="cal-dow cal-dow-sat">土</div>`;

    for (let i = 0; i < firstDay; i++) {
      html += `<div class="cal-day cal-day-empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const dateObj = new Date(y, m, d);
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateObj.getTime() === today.getTime();
      const dow = dateObj.getDay();
      const events = dayMap[dateStr] || [];

      let dayCls = 'cal-day';
      if (isToday) dayCls += ' cal-day-today';
      if (dow === 0) dayCls += ' cal-day-sun';
      if (dow === 6) dayCls += ' cal-day-sat';

      html += `<div class="${dayCls}">
        <span class="cal-date-num">${d}</span>`;

      events.forEach(ev => {
        html += `<div class="cal-event" style="background:${ev.color};" onclick="openDetail('${ev.caseId}')" title="${esc(ev.name)}">
          <span class="cal-event-phase">${ev.short}</span>
          <span class="cal-event-name">${esc(ev.name)}</span>
        </div>`;
      });

      html += `</div>`;
    }

    html += `</div></div>`;
  }

  el.innerHTML = html;
}

function fixGanttBars() {
  const table = document.querySelector('.gantt-table');
  if (!table) return;
  const rows = table.querySelectorAll('.gantt-row');
  if (!rows.length) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const statusColors = {
    '未着手': '#7c3aed', '進行中': '#2563eb', 'レビュー中': '#d97706', '完了': '#059669', '保留': '#dc2626',
  };

  const PHASE_DEFS = [
    { key: 'dl1', short: '入稿' },
    { key: 'dl2', short: '初校' },
    { key: 'dl3', short: '校了' },
    { key: 'dl4', short: '仕上がり' },
    { key: 'dl5', short: 'SET UP' },
    { key: 'dl6', short: '完了日' },
  ];

  const headerCells = table.querySelectorAll('.gantt-week-header th');
  if (headerCells.length < 2) return;
  const cellWidth = 28;

  const dayHeaders = Array.from(headerCells).slice(1);

  const { year: sy, month: sm } = ganttStartMonth;
  const months3 = [0,1,2].map(i => { let m=sm+i,y=sy; while(m>11){m-=12;y++;} return {year:y,month:m}; });
  const cellDates = dayHeaders.map((hCell, idx) => {
    const dayNum = parseInt(hCell.textContent);
    if (!dayNum) return null;
    let dayCount = 0;
    for (const {year, month} of months3) {
      const dim = new Date(year, month+1, 0).getDate();
      if (idx < dayCount + dim) {
        const d = new Date(year, month, dayNum);
        d.setHours(0,0,0,0);
        return d;
      }
      dayCount += dim;
    }
    return null;
  });

  cases.forEach((c, ci) => {
    const row = rows[ci];
    if (!row) return;
    const cells = row.querySelectorAll('.gantt-cell');
    cells.forEach(cell => { cell.querySelectorAll('.gantt-bar,.gantt-deadline,.phase-marker').forEach(el => el.remove()); });

    const phaseDates = PHASE_DEFS.map(p => c[p.key]).filter(Boolean).sort();
    if (!phaseDates.length) return;

    const startDate = new Date(phaseDates[0]); startDate.setHours(0,0,0,0);
    const endDate = new Date(phaseDates[phaseDates.length-1]); endDate.setHours(0,0,0,0);
    const color = statusColors[c.status] || '#8a94a6';

    let barStartCell = -1, barEndCell = -1;
    cellDates.forEach((cd, idx) => {
      if (!cd) return;
      if (cd >= startDate && cd <= endDate) {
        if (barStartCell === -1) barStartCell = idx;
        barEndCell = idx;
      }
    });
    if (barStartCell === -1) return;

    const startCell = cells[barStartCell];
    if (!startCell) return;

    const barWidth = (barEndCell - barStartCell + 1) * cellWidth - 4;
    const bar = document.createElement('div');
    bar.className = 'gantt-bar';
    bar.style.cssText = `left:2px;width:${barWidth}px;background:${color};opacity:0.9;`;
    bar.title = c.name;
    bar.innerHTML = `
      <div style="position:absolute;left:0;top:0;bottom:0;width:${c.progress}%;background:rgba(255,255,255,0.22);border-radius:4px;"></div>
      <span class="gantt-bar-label" style="padding-left:8px;">${c.name}</span>
    `;
    bar.onclick = () => openDetail(c.id);
    startCell.appendChild(bar);

    PHASE_DEFS.forEach(p => {
      if (!c[p.key]) return;
      const phaseDate = new Date(c[p.key]); phaseDate.setHours(0,0,0,0);

      const markerIdx = cellDates.findIndex(cd => cd && cd.getTime() === phaseDate.getTime());
      if (markerIdx === -1) return;
      const markerCell = cells[markerIdx];
      if (!markerCell) return;

      const relativeX = (markerIdx - barStartCell) * cellWidth + cellWidth / 2;

      const marker = document.createElement('div');
      marker.className = 'phase-marker';
      marker.style.cssText = `left:${relativeX}px;`;
      marker.innerHTML = `
        <div class="phase-marker-diamond"></div>
        <span class="phase-marker-label">${p.short}</span>
      `;
      bar.appendChild(marker);
    });
  });
}
// ===== 詳細モーダル =====
let detailId = null;

const PHASES_DEF = [
  { key: 'dl1', label: 'デザイン入稿' },
  { key: 'dl2', label: 'デザイン初校' },
  { key: 'dl3', label: 'デザイン校了' },
  { key: 'dl4', label: '印刷加工仕上がり' },
  { key: 'dl5', label: 'セットアップ' },
  { key: 'dl6', label: '完了日', isCompletion: true },
];

function openDetail(id) {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  detailId = id;

  document.getElementById('dTitle').textContent = c.name;
  document.getElementById('dId').textContent = c.id;

  // ステータス
  const statusEl = document.getElementById('dStatus');
  statusEl.innerHTML = `<span class="badge badge-${c.status}">${c.status}</span>`;

  // 進捗
  const _prog = calcProgress(c);
  const progColor = c.status === '完了' ? 'var(--green)' : _prog >= 80 ? 'var(--green)' : _prog >= 40 ? 'var(--accent)' : 'var(--purple)';
  document.getElementById('dProgressFill').style.cssText = `width:${_prog}%;background:${progColor}`;
  document.getElementById('dProgressNum').textContent = _prog + '%';
  document.getElementById('dProgressNum').style.color = progColor;

  // 担当
  document.getElementById('dOwner').textContent = c.owner || '—';
  document.getElementById('dSales').textContent = c.sales || '—';
  document.getElementById('dSalesEi').textContent = c.salesEi || '—';
  document.getElementById('dPrint').textContent = c.print || '—';

  // フェーズ
  const today = new Date(); today.setHours(0,0,0,0);
  const soon = new Date(today); soon.setDate(soon.getDate() + 7);
  const phaseEl = document.getElementById('dPhases');
  const phaseItems = PHASES_DEF.map(p => {
    if (!c[p.key]) return '';
    const d = new Date(c[p.key]); d.setHours(0,0,0,0);
    let cls = 'ok', dotColor = 'var(--border)';
    if (p.isCompletion) { dotColor = 'var(--green)'; }
    else if (c.status !== '完了') {
      if (d < today) { cls = 'overdue'; dotColor = 'var(--red)'; }
      else if (d <= soon) { cls = 'soon'; dotColor = 'var(--yellow)'; }
      else { dotColor = 'var(--accent)'; }
    }
    const _dpd = new Date(c[p.key].replace(/-/g, '/'));
    const _ddow = ['日','月','火','水','木','金','土'][_dpd.getDay()];
    const dateStr = _dpd.getFullYear() + '/' + (_dpd.getMonth()+1) + '/' + _dpd.getDate() + ' (' + _ddow + ')';
    return `<div class="detail-phase-item">
      <span class="detail-phase-dot" style="background:${dotColor}"></span>
      <span class="detail-phase-name" style="${p.isCompletion?'color:var(--green);font-weight:600;':''}">${p.label}</span>
      <span class="detail-phase-date ${p.isCompletion?'':cls}" style="${p.isCompletion?'color:var(--green);font-weight:600;':''}">${dateStr}</span>
    </div>`;
  }).filter(Boolean).join('');
  phaseEl.innerHTML = phaseItems || '<span style="color:var(--muted);font-size:13px">設定なし</span>';

  // メモ
  const noteEl = document.getElementById('dNote');
  if (c.note && c.note.trim()) {
    noteEl.textContent = c.note;
    noteEl.classList.remove('empty');
  } else {
    noteEl.textContent = 'メモなし';
    noteEl.classList.add('empty');
  }

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  detailId = null;
}

function closeDetailOnOverlay(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
}

function deleteCaseFromModal() {
  if (!editId) return;
  if (!confirm('この案件を削除しますか？')) return;
  closeModal();
  deleteCase(editId);
}

function openEditFromDetail() {
  const id = detailId;
  closeDetail();
  openModal(id);
}

function deleteFromDetail() {
  if (detailId) {
    closeDetail();
    deleteCase(detailId);
  }
}

// ===== お知らせ =====
// ===== お知らせ（タイムライン形式） =====
let announcements = [];

function renderAnnouncements(list) {
  const el = document.getElementById('announcementList');
  if (!list.length) {
    el.innerHTML = '<div class="log-empty">お知らせはありません</div>';
    return;
  }
  el.innerHTML = list.map((a, i) => `
    <div class="announcement-item">
      <div class="announcement-text">${esc(a.text)}</div>
      <div class="announcement-meta">
        <span class="announcement-time">${esc(a.time)}</span>
        <button class="btn-announcement-delete" onclick="deleteAnnouncement(${i})">削除</button>
      </div>
    </div>
  `).join('');
}

function toggleNoticeEdit() {
  const wrap = document.getElementById('noticeEditWrap');
  const isOpen = wrap.classList.contains('open');
  if (!isOpen) {
    document.getElementById('noticeTextarea').value = '';
    wrap.classList.add('open');
    document.getElementById('noticeTextarea').focus();
  } else {
    wrap.classList.remove('open');
  }
}

function cancelNoticeEdit() {
  document.getElementById('noticeEditWrap').classList.remove('open');
}

async function saveNotice() {
  const text = document.getElementById('noticeTextarea').value.trim();
  if (!text) return;
  document.getElementById('noticeEditWrap').classList.remove('open');
  document.getElementById('noticeTextarea').value = '';
  // 即時表示
  const now = new Date();
  const dow = ['日','月','火','水','木','金','土'][now.getDay()];
  const time = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + ' (' + dow + ') ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  announcements.unshift({ text, time });
  renderAnnouncements(announcements);
  // GASに保存
  try {
    const formData = new FormData();
    formData.append('action', 'addAnnouncement');
    formData.append('text', text);
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData });
  } catch(e) {}
  addLog('📣', 'お知らせを投稿しました');
}

async function deleteAnnouncement(index) {
  if (!confirm('この投稿を削除しますか？')) return;
  announcements.splice(index, 1);
  renderAnnouncements(announcements);
  try {
    const formData = new FormData();
    formData.append('action', 'deleteAnnouncement');
    formData.append('index', String(index));
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData });
  } catch(e) {}
}

// ===== 更新ログ（GAS連携） =====
const MAX_LOGS = 10;

async function loadLog() {
  try {
    const res = await fetch(GAS_URL + '?action=getLogs', { redirect: 'follow' });
    const logs = await res.json();
    renderLog(Array.isArray(logs) ? logs : []);
  } catch(e) {
    renderLog([]);
  }
}

function renderLog(logs) {
  const el = document.getElementById('logList');
  if (!logs.length) {
    el.innerHTML = '<div class="log-empty">ログはありません</div>';
    return;
  }
  el.innerHTML = logs.map((l, i) => `
    <div class="log-item" style="animation-delay:${i*20}ms">
      <span class="log-icon">${l.icon}</span>
      <div class="log-content">
        <div class="log-text">${l.text}</div>
        <div class="log-time">${l.time}</div>
      </div>
    </div>
  `).join('');
}

function sendSlack(text) {
  const plainText = text.replace(/<strong>/g,'*').replace(/<\/strong>/g,'*').replace(/<[^>]+>/g,'');
  const formData = new FormData();
  formData.append('action', 'slack');
  formData.append('text', '【関広見まつり商品企画】' + plainText);
  fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData }).catch(() => {});
}

async function addLog(icon, text) {
  const now = new Date();
  const dow = ['日','月','火','水','木','金','土'][now.getDay()];
  const time = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + ' (' + dow + ') ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const log = { icon, text, time };
  // 画面に即時反映
  const el = document.getElementById('logList');
  const current = el.querySelectorAll('.log-item');
  const newItem = document.createElement('div');
  newItem.className = 'log-item';
  newItem.innerHTML = `<span class="log-icon">${icon}</span><div class="log-content"><div class="log-text">${text}</div><div class="log-time">${time}</div></div>`;
  el.insertBefore(newItem, el.firstChild);
  if (current.length >= MAX_LOGS) el.removeChild(el.lastChild);
  // GASに保存
  try {
    const formData = new FormData();
    formData.append('action', 'saveLog');
    formData.append('log', JSON.stringify(log));
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData });
  } catch(e) {}
  sendSlack(icon + ' ' + text);
}

async function clearLog() {
  if (!confirm('ログをすべて削除しますか？')) return;
  renderLog([]);
  try {
    const formData = new FormData();
    formData.append('action', 'clearLogs');
    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData });
  } catch(e) {}
}

async function loadAll() {
  showLoading(true);
  try {
    const res = await fetch(GAS_URL + '?action=getAll&t=' + Date.now(), { redirect: 'follow' });
    const data = await res.json();
    // 案件
    cases = Array.isArray(data.cases) ? data.cases.map(c => ({
      ...c,
      progress: parseInt(c.progress) || 0,
    })) : [];
    // お知らせ
    announcements = Array.isArray(data.announcements) ? data.announcements : [];
    renderAnnouncements(announcements);
    // ログ
    renderLog(Array.isArray(data.logs) ? data.logs : []);
  } catch(e) {
    console.error('loadAll error', e);
    cases = [];
  }
  showLoading(false);
  render();
  if (document.getElementById('viewGantt').style.display !== 'none') renderGantt();
}

loadAll();
